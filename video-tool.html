<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 本地影片無損剪輯工具 - 極速本地隱私工具箱</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .status { color: #666; font-style: italic; margin: 10px 0; }
        .time-input { margin: 15px 0; }
        .time-input label { margin-right: 10px; }
        .time-input input { width: 100px; padding: 5px; text-align: center; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
    <script src="coi-serviceworker.js"></script>
</head>
<body>
    <div class="container">
        <h2>🎬 本地影片無損剪輯工具 (秒速裁切)</h2>
        <p>狀態：<span id="status" class="status">正在載入 FFmpeg 核心...</span></p>
        
        <input type="file" id="uploader" accept="video/*" disabled>
        
        <div class="time-input">
            <label>開始時間：<input type="text" id="startTime" value="00:01:20" placeholder="hh:mm:ss"></label>
            <label>結束時間：<input type="text" id="endTime" value="00:10:45" placeholder="hh:mm:ss"></label>
        </div>
        
        <button id="convertBtn" disabled>開始無損剪輯</button>
        <br><br>
        
        <video id="outputVideo" controls width="100%" style="display:none;"></video>
        <br>
        <a id="downloadLink" style="display:none; margin-top:10px; display:inline-block; color:#007bff; font-weight:bold;" download="完美剪輯版.mp4">📥 下載剪輯版影片</a>
    </div>

    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile, toBlobURL } = FFmpegUtil;
        const ffmpeg = new FFmpeg();

        const statusText = document.getElementById('status');
        const uploader = document.getElementById('uploader');
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput = document.getElementById('endTime');
        const convertBtn = document.getElementById('convertBtn');
        const outputVideo = document.getElementById('outputVideo');
        const downloadLink = document.getElementById('downloadLink');

        ffmpeg.on('log', ({ message }) => console.log(message));

        async function loadFFmpeg() {
            try {
                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                });
                statusText.innerText = "FFmpeg 載入成功！請選擇影片並輸入時間。";
                uploader.disabled = false;
            } catch (error) {
                statusText.innerText = "載入失敗，瀏覽器可能不支援 SharedArrayBuffer。";
                console.error(error);
            }
        }

        convertBtn.addEventListener('click', async () => {
            const file = uploader.files[0];
            if (!file) return;

            const ss = startTimeInput.value.trim();
            const to = endTimeInput.value.trim();

            statusText.innerText = "正在極速剪輯中...";
            convertBtn.disabled = true;

            try {
                await ffmpeg.writeFile('input.mp4', await fetchFile(file));
                await ffmpeg.exec(['-ss', ss, '-to', to, '-i', 'input.mp4', '-c', 'copy', 'output.mp4']);
                const data = await ffmpeg.readFile('output.mp4');

                const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                const videoUrl = URL.createObjectURL(videoBlob);

                outputVideo.src = videoUrl;
                outputVideo.style.display = 'block';

                downloadLink.href = videoUrl;
                downloadLink.style.display = 'block';

                statusText.innerText = "剪輯完成！";
            } catch (error) {
                statusText.innerText = "剪輯失敗，請檢查時間格式或檔案。";
                console.error(error);
            } finally {
                convertBtn.disabled = false;
            }
        });

        uploader.addEventListener('change', () => {
            if (uploader.files.length > 0) convertBtn.disabled = false;
        });

        loadFFmpeg();
    </script>
</body>
</html>
